tests:
  - id: "2.HashPerformanceTest"
    description: "验证Hash数据类型，HSET后验证HSCAN命令是否正常执行，以及执行效率"
    configs:
      # 是否禁用本测试
      disable: false
      # 指定数据文件名称，必须在配置中的dataFiles中有相应的数据文件配置
      dataFileName: "hash-data"
      # 指定连接的名称，必须在配置中的connections中有相应的连接配置
      connectionName: "localSingle"
      # 是否在测试前先清空DB
      flushBefore: true
      # 是否在测试后清理测试数据，根据key值逐条清理
      cleanAfter: false
      # 是否从从节点读取数据, 默认是false
      readFromSlave: false
      # 测试时同时产生的并发线程数
      threads: 20
      #每个线程中的客户端数
      threadClients: 10
      # 每个客户端循环执行的次数, 如果是0表示无限循环；默认值为1
      loopCount: 1
      # 每隔1000毫秒打印一次状态信息, 默认是1000
      stateInterval: 5000
      # 是否运行时解析命令行中的变量表达式，运行时解析会耗用较少的内存但会影响运行效率增大CPU使用，默认是false
      runtimeParse: true
      ############### 测试命令相关配置 ################
      commands: [
        # 执行 HSET ${KEY} ${VALUE1} ${VALUE2} 命令，并校验返回值不为空。
        { line: "HSET '${KEY}' '${VALUE1}' '${VALUE2}'", returnAssert: "#{NOT_EMPTY}", returnType: "LONG" },
        # 执行 HGET ${KEY} ${VALUE1} 命令，并校验返回值是否等于 ${VALUE2}，并重复执行9次。
        { line: "HGET '${KEY}' '${VALUE1}'", returnAssert: "${VALUE2}", returnType: "STRING", repeatTimes: 9 }
      ]

      # 表示按key逐一循环执行，并在commands定义的子项循环前执行。
      keyBeforeCommands: [
        { line: "EXISTS '${KEY}'", returnAssert: "0", returnType: "LONG" }
      ]

      # 表示按key逐一循环执行，并在commands定义的子项循环后执行。
      keyAfterCommands: [
        { line: "HLEN '${KEY}'", returnAssert: "10", returnType: "LONG" }
      ]



